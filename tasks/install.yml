- block:
  - name: "[control-plane/worker]: Create /run/systemd/resolve directory if it does not exist"
    file:
      path: /run/systemd/resolve
      state: directory
      mode: '0755'

  - name: "[control-plane/worker]: Link /etc/resolv.conf to /run/systemd/resolve/resolv.conf"
    ansible.builtin.file:
      src: /etc/resolv.conf
      dest: /run/systemd/resolve/resolv.conf
      state: link

  - name: "[control-plane/worker]: Restart kubelet service"
    ansible.builtin.systemd:
      name: kubelet
      state: restarted

  when: ansible_os_family.lower() == 'redhat'