- name: "[control-plane/worker]: Ensure net.ipv4.ip_forward is set to 1"
  ansible.builtin.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

- name: "[control-plane/worker]: Update apt package index"
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_distribution == 'Ubuntu'

- name: "[control-plane/worker]: Update YUM package index"
  ansible.builtin.yum:
    update_cache: yes
  when: ansible_os_family.lower() == 'redhat' and ansible_distribution_major_version >= '9' 

- name: "[control-plane/worker]: Ensure required packages are installed"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - bash-completion
    state: present
  when: ansible_distribution == 'Ubuntu'

- name: "[control-plane/worker]: Ensure required packages are installed on RedHat"
  ansible.builtin.yum:
    name:
      - yum-utils
      - ca-certificates
      - curl
      - gnupg2
      - bash-completion
    state: present
  when: ansible_os_family.lower() == 'redhat' and ansible_distribution_major_version >= '9' 

