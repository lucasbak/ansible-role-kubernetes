
- name: Ensure MetalLB Helm repo is present
  kubernetes.core.helm_repository:
    name: metallb
    repo_url: https://metallb.github.io/metallb

- name: Ensure MetalLB namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ metallb_namespace | default('metallb-system') }}"
    state: present

- name: Install/upgrade MetalLB via Helm
  kubernetes.core.helm:
    name: metallb
    chart_ref: metallb/metallb
    release_namespace: "{{ metallb_namespace | default('metallb-system') }}"
    create_namespace: false
    chart_version: "{{ (metallb_chart_version | default('')) | ternary(metallb_chart_version, omit) }}"
    wait: true
    atomic: true

- name: debug metallb_address_ranges
  debug:
    msg: "{{ metallb_address_ranges }}"

- name: Configure MetalLB IPAddressPool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: "{{ metallb_address_pool_name | default('default-pool') }}"
        namespace: "{{ metallb_namespace | default('metallb-system') }}"
      spec:
        addresses: "{{ metallb_address_ranges }}"
  when: metallb_address_ranges is defined and metallb_address_ranges | length > 0

- name: Configure L2Advertisement for the pool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: l2advertisement
        namespace: "{{ metallb_namespace | default('metallb-system') }}"
      spec:
        ipAddressPools:
          - "{{ metallb_address_pool_name | default('default-pool') }}"
