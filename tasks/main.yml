# Common facts — computed once on every host (master, worker, client) before any
# CNI/install task can depend on them. Lifted out of setup.yml so client-only hosts
# (which still need the pod CIDR for the Calico manifest patch) see them too.
- name: Compute Kubernetes common facts
  set_fact:
    _k8s_api_advertise_address: "{{ hosts | selectattr('fqdn', 'equalto', inventory_hostname) | map(attribute='ip') | first | default(omit) }}"
    _k8s_pod_network_cidr: "{{ k8s_pod_network_cidr | default('10.244.0.0/16') }}"
    _k8s_service_cidr: "{{ k8s_service_cidr | default('10.96.0.0/12') }}"
    _k8s_control_plane_endpoint: "{{ k8s_controlplane_endpoint_hostname | default('') }}"

- set_fact:
    ips: "{{ hosts | map(attribute='ip')| list}}"

- set_fact:
    host_line: "{{ k8s_controlplane_endpoint_ip }} {{ k8s_controlplane_endpoint_hostname }}"
  when: k8s_controlplane_endpoint_ip not in ips

- set_fact:
    host_line: "{{ k8s_controlplane_endpoint_ip }} {{ hosts | selectattr('ip', 'equalto', k8s_controlplane_endpoint_ip) | map(attribute='fqdn') | first }}  {{ k8s_controlplane_endpoint_hostname }}"
  when: k8s_controlplane_endpoint_ip in ips

- import_tasks: install_haproxy.yml
  when: inventory_hostname == "{{ loadbalancer_server }}" and loadbalancer_method == "haproxy"

- import_tasks: install_apache2.yml
  when: inventory_hostname == "{{ loadbalancer_server }}" and loadbalancer_method == "apache2"

- import_tasks: install.yml
  when: inventory_hostname in k8s_masters or inventory_hostname in k8s_workers

- import_tasks: etcd.yml
  when: inventory_hostname in k8s_masters

- import_tasks: setup.yml

- import_tasks: install_helm.yml
  when: inventory_hostname == "{{ k8s_masters | first }}"

- import_tasks: install_metallb.yml
  when: inventory_hostname == "{{ k8s_masters | first }}"

- import_tasks: install_metrics_server.yml
  when: inventory_hostname == "{{ k8s_masters | first }}"

- import_tasks: install_ingress_controller.yml
  when: inventory_hostname == "{{ k8s_masters | first }}" and ingress_nginx_enabled

- import_tasks: install_localpath_provisioner.yml
  when: inventory_hostname == "{{ k8s_masters | first }}" and localpath_provisioner_enabled

- import_tasks: client.yml
  when: (not(inventory_hostname in k8s_masters)) and (not (inventory_hostname in k8s_workers))

