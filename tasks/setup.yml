
- name: Disable swap
  command: swapoff -a

# Note: _k8s_api_advertise_address / _k8s_pod_network_cidr / _k8s_service_cidr /
# _k8s_control_plane_endpoint are now computed once in tasks/main.yml so client-only
# hosts can rely on them too. Do not re-set them here.

- name: Ensure entry for k8s_controlplane_endpoint_hostname exists in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^{{k8s_controlplane_endpoint_ip}}'
    line: "{{ host_line }}"
    state: present

- name: Check if kube-scheduler manifest exists
  stat:
    path: /etc/kubernetes/manifests/kube-scheduler.yaml
  register: kube_scheduler_manifest

- name: Generate kube-adm config
  template:
    src: kubadm-config.yml.j2
    dest: /root/kubeadm-config.yaml

- name: "[Bootstrap Kubernetes] - CA"
  shell: >
     kubeadm init phase certs ca
  when: inventory_hostname == "{{ k8s_masters | first }}"

- name: "[Kubelet not first] - Download Kubernetes ca.crt and ca.key"
  fetch:
    src: "/etc/kubernetes/pki/{{ item }}"
    dest: /tmp/pki/{{ item }}
    flat: yes
  when: inventory_hostname != "{{ k8s_masters | first }}" and inventory_hostname in k8s_masters
  delegate_to: "{{ k8s_masters | first }}"
  with_items:
    - ca.crt
    - ca.key

- name: create /etc/kubernetes/pki directory
  file:
    dest: /etc/kubernetes/pki
    state: directory

- name: "[Kubelet not first] - Upload Kubernetes PKI ca.crt"
  copy:
    dest: "/etc/kubernetes/pki/{{ item }}"
    src: /tmp/pki/{{ item }}
  when: inventory_hostname != "{{ k8s_masters | first }}" and inventory_hostname in k8s_masters
  with_items:
    - ca.crt
    - ca.key

- name: "[Bootstrap Node] - Pull image before"
  shell: >
    kubeadm config images pull --config /root/kubeadm-config.yaml
  when: inventory_hostname in k8s_masters or inventory_hostname in k8s_workers

