- name: Initialize Kubernetes cluster
  command: >-
    kubeadm init
    --config /root/kubeadm-config.yaml
    --upload-certs
    --node-name {{ inventory_hostname }}
    {% if kubernetes_pod_network_cni == 'cilium' and cilium_kube_proxy_replacement %}--skip-phases=addon/kube-proxy{% endif %}
  register: kubeadm_init
  when: inventory_hostname == "{{ k8s_masters | first }}" and not kube_scheduler_manifest.stat.exists

- name: Print the init output to screen to add other nodes
  debug:
    var: kubeadm_init.stdout
    verbosity: 2
  when: inventory_hostname == "{{ k8s_masters | first }}" and not kube_scheduler_manifest.stat.exists

- name: Write kubeadm init output to a file
  copy:
    content: "{{ kubeadm_init.stdout }}"
    dest: /tmp/kubeadm_init_output.txt
  when: inventory_hostname == "{{ k8s_masters | first }}" and not kube_scheduler_manifest.stat.exists

- name: Wait for Kubernetes API server to be running
  uri:
    url: "https://{{ k8s_masters | first }}:6443/healthz"
    method: GET
    validate_certs: no
  register: result
  until: result.status == 200
  retries: 10
  delay: 15
  when: inventory_hostname != "{{ k8s_masters | first }}"

- name: Check if kubeadm init output file exists on first master
  stat:
    path: /tmp/kubeadm_init_output.txt
  register: kubeadm_init_output_stat
  delegate_to: "{{ k8s_masters | first }}"
  run_once: true

- name: Regenerate kubeadm join tokens (re-run — cluster already initialized)
  block:
    - name: Upload certs and capture new certificate key
      shell: kubeadm init phase upload-certs --upload-certs 2>&1 | tail -1
      register: _new_cert_key
    - name: Generate fresh worker join command
      shell: kubeadm token create --print-join-command
      register: _worker_join_cmd
    - name: Write synthetic kubeadm init output with regenerated tokens
      copy:
        content: |
          Your Kubernetes control-plane has initialized successfully!

          You can now join any number of the control-plane node running the following command on each as root:

            {{ _worker_join_cmd.stdout }} \
                  --control-plane --certificate-key {{ _new_cert_key.stdout }}

          Then you can join any number of worker nodes by running the following on each as root:

          {{ _worker_join_cmd.stdout }}
        dest: /tmp/kubeadm_init_output.txt
  when: not kubeadm_init_output_stat.stat.exists
  delegate_to: "{{ k8s_masters | first }}"
  run_once: true

- name: Fetch kubeadm init output from first master
  fetch:
    src: /tmp/kubeadm_init_output.txt
    dest: /tmp/kubeadm_init_output.txt
    flat: yes
  delegate_to: "{{ k8s_masters | first }}"

- name: Upload Kube adm init output to all hosts
  copy:
    src: /tmp/kubeadm_init_output.txt
    dest: /tmp/kubeadm_init_output.txt
  when: inventory_hostname != "{{ k8s_masters | first }}" and inventory_hostname in k8s_workers

- name: "[kube-worker] Extract kubeadm join command"
  shell: |
    grep -A 2 "kubeadm join" /tmp/kubeadm_init_output.txt | tail -n2
  register: kubeadm_join_worker
  when: inventory_hostname in k8s_workers

- name: "[kube-all-nodes] - Upload /tmp/kubeadm_init_output.txt"
  copy:
    src: /tmp/kubeadm_init_output.txt
    dest: /tmp/kubeadm_init_output.txt
  when: inventory_hostname != "{{ k8s_masters | first }}" and inventory_hostname in k8s_masters

- name: "[kube-controlplane] Extract kubeadm join command"
  shell: |
    grep -A 2 "kubeadm join" /tmp/kubeadm_init_output.txt | head -n3
  register: kubeadm_join_cp
  when: inventory_hostname != "{{ k8s_masters | first }}" and inventory_hostname in k8s_masters

- name: Fetch admin.conf from first master
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: /tmp/admin.conf
    flat: yes
  delegate_to: "{{ k8s_masters | first }}"

- name: create ~/.kube directory
  file:
    dest: /root/.kube
    state: directory

- name: "[kube-all-nodes] - Upload the kubectl admin.conf"
  copy:
    src: /tmp/admin.conf
    dest: /root/.kube/config
  when: inventory_hostname != "{{ k8s_masters | first }}"

- name: "[kube-all-nodes] - Symlink the kubectl admin.conf to ~/.kube/conf."
  file:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    state: link
    mode: 0644
  when: inventory_hostname == "{{ k8s_masters | first }}"

- name: Check if node is already part of the cluster
  shell: kubectl get nodes --no-headers -o custom-columns=:.metadata.name
  register: kubectl_get_nodes
  failed_when: false
  changed_when: false
  ignore_errors: true
  when: inventory_hostname in k8s_masters or inventory_hostname in k8s_workers

- name: Set fact if node is already joined
  set_fact:
    node_already_joined: "{{inventory_hostname in kubectl_get_nodes.stdout_lines}}"
  when: kubectl_get_nodes is succeeded and kubectl_get_nodes.stdout_lines is defined
  
- name: "[kube-controlplane] - Join Kubernetes cluster as controlplane node"
  shell: |
    {{kubeadm_join_cp.stdout}} --apiserver-advertise-address {{ hosts | selectattr('fqdn', 'equalto', inventory_hostname) | map(attribute='ip') | first }}
  when: node_already_joined is defined and not node_already_joined and inventory_hostname != "{{ k8s_masters | first }}" and not kube_scheduler_manifest.stat.exists and inventory_hostname in k8s_masters

- debug:
    msg: "{{node_already_joined}} - {{inventory_hostname}} != {{ k8s_masters | first }}"
  when: node_already_joined is defined

- name: "[kube-controlplane] - Join Kubernetes cluster as worker node"
  shell: |
    {{kubeadm_join_worker.stdout}} --apiserver-advertise-address {{ hosts | selectattr('fqdn', 'equalto', inventory_hostname) | map(attribute='ip') | first }} --node-name {{ inventory_hostname }}
  when: node_already_joined is defined and not node_already_joined and inventory_hostname != "{{ k8s_masters | first }}" and not kube_scheduler_manifest.stat.exists and inventory_hostname in k8s_workers

- name: "[kube-all-nodes] - generate bash completion"
  shell: >
    kubectl completion bash > /etc/bash_completion.d/kubectl
  when: not ((not(inventory_hostname in k8s_masters)) and (not (inventory_hostname in k8s_workers)))

- name: "[kube-all-nodes] - Get Kubernetes version for [CNI: Weave] installation."
  shell: kubectl version | head -n 1 | awk '{print $3}' | cut -d. -f1,2
  changed_when: false
  register: kubectl_version
  when: kubernetes_pod_network_cni == 'weave' and not((not(inventory_hostname in k8s_masters)) and (not (inventory_hostname in k8s_workers)))
  until: kubectl_version is not failed
  retries: 12
  delay: 5

- name: Configure Weave networking.
  shell: >
    kubectl apply -f https://reweave.azurewebsites.net/k8s/{{ kubectl_version.stdout }}/net.yaml
  register: weave_result
  changed_when: "'created' in weave_result.stdout"
  when: kubernetes_pod_network_cni == 'weave' and not((not(inventory_hostname in k8s_masters)) and (not (inventory_hostname in k8s_workers)))
  until: weave_result is succeeded

# ---------------- CNI: Calico ----------------
- name: "[kube-cni:calico] - Download Calico manifest"
  get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
    dest: "/tmp/calico-{{ calico_version }}.yaml"
    mode: '0644'
    force: yes
  when: kubernetes_pod_network_cni == 'calico' and inventory_hostname == k8s_masters | first

- name: "[kube-cni:calico] - Uncomment IPV4POOL_CIDR env var name"
  replace:
    path: "/tmp/calico-{{ calico_version }}.yaml"
    regexp: '^(\s*)# - name: CALICO_IPV4POOL_CIDR\s*$'
    replace: '\1- name: CALICO_IPV4POOL_CIDR'
  when: kubernetes_pod_network_cni == 'calico' and inventory_hostname == k8s_masters | first

- name: "[kube-cni:calico] - Uncomment IPV4POOL_CIDR value and set cluster pod CIDR"
  replace:
    path: "/tmp/calico-{{ calico_version }}.yaml"
    regexp: '^(\s*)#   value: "192\.168\.0\.0/16"\s*$'
    replace: '\1  value: "{{ _k8s_pod_network_cidr }}"'
  when: kubernetes_pod_network_cni == 'calico' and inventory_hostname == k8s_masters | first

- name: "[kube-cni:calico] - Apply Calico manifest"
  shell: kubectl apply -f /tmp/calico-{{ calico_version }}.yaml
  register: calico_result
  changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"
  until: calico_result is succeeded
  retries: 6
  delay: 10
  when: kubernetes_pod_network_cni == 'calico' and inventory_hostname == k8s_masters | first

# ---------------- CNI: Cilium ----------------
- name: "[kube-cni:cilium] - Ensure Helm is installed (required for Cilium chart install)"
  include_tasks: install_helm.yml
  when: kubernetes_pod_network_cni == 'cilium' and inventory_hostname == k8s_masters | first

- name: "[kube-cni:cilium] - Add Cilium Helm repo"
  shell: helm repo add cilium https://helm.cilium.io/ && helm repo update cilium
  register: cilium_repo
  changed_when: "'has been added' in cilium_repo.stdout"
  when: kubernetes_pod_network_cni == 'cilium' and inventory_hostname == k8s_masters | first

# When kubeProxyReplacement is on, Cilium needs kube-proxy GONE before it installs:
#   - Fresh install: kubeadm init --skip-phases=addon/kube-proxy already prevented its creation,
#     so this is a no-op (--ignore-not-found).
#   - Migration from a non-replacement config: this removes the existing kube-proxy DS + CM.
- name: "[kube-cni:cilium] - Remove kube-proxy DaemonSet (kubeProxyReplacement=true)"
  shell: kubectl -n kube-system delete daemonset kube-proxy --ignore-not-found=true
  register: kp_ds_delete
  changed_when: "'deleted' in kp_ds_delete.stdout"
  when:
    - kubernetes_pod_network_cni == 'cilium'
    - cilium_kube_proxy_replacement
    - inventory_hostname == k8s_masters | first

- name: "[kube-cni:cilium] - Remove kube-proxy ConfigMap (kubeProxyReplacement=true)"
  shell: kubectl -n kube-system delete configmap kube-proxy --ignore-not-found=true
  register: kp_cm_delete
  changed_when: "'deleted' in kp_cm_delete.stdout"
  when:
    - kubernetes_pod_network_cni == 'cilium'
    - cilium_kube_proxy_replacement
    - inventory_hostname == k8s_masters | first

- name: "[kube-cni:cilium] - Flush stale iptables rules left by kube-proxy (kubeProxyReplacement=true)"
  shell: |
    iptables-save | grep -vE 'KUBE-|cali-|CILIUM-' | iptables-restore || true
  when:
    - kubernetes_pod_network_cni == 'cilium'
    - cilium_kube_proxy_replacement
    - inventory_hostname in k8s_masters or inventory_hostname in k8s_workers
  changed_when: false

- name: "[kube-cni:cilium] - Install Cilium via Helm"
  shell: >
    helm upgrade --install cilium cilium/cilium
    --version {{ cilium_version }}
    --namespace kube-system
    --set ipam.mode=kubernetes
    --set kubeProxyReplacement={{ 'true' if cilium_kube_proxy_replacement else 'false' }}
    {% if cilium_kube_proxy_replacement %}
    --set k8sServiceHost={{ k8s_controlplane_endpoint_ip }}
    --set k8sServicePort=6443
    {% endif %}
  register: cilium_result
  changed_when: "'STATUS: deployed' in cilium_result.stdout"
  until: cilium_result is succeeded
  retries: 6
  delay: 10
  when: kubernetes_pod_network_cni == 'cilium' and inventory_hostname == k8s_masters | first

- name: Import kubernetes ca into java keystore
  shell: >
    {{ java_bin_dir }}/keytool -noprompt -import -trustcacerts -alias kubernetes-ca -file /etc/kubernetes/pki/ca.crt -keystore {{ java_keystore_system_path }} -storepass changeit
  when: inventory_hostname in k8s_masters and not((not(inventory_hostname in k8s_masters)) and (not (inventory_hostname in k8s_workers)))
  ignore_errors: yes